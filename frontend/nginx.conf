worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        # Re-resolve Docker service names when backend is recreated (nginx caches
        # hostnames in proxy_pass unless a variable is used).
        resolver 127.0.0.11 valid=10s ipv6=off;

        # 1. Serve React static files (Frontend)
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            # This line is crucial so React Router handles page refreshes properly
            try_files $uri $uri/ /index.html; 
        }

        # 2. Route standard API requests to Spring Boot (Backend)
        location /api/ {
            set $backend_upstream http://backend:8080;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # 3. Route WebSocket traffic (Live Prices)
        location /ws {
            set $backend_upstream http://backend:8080;
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_connect_timeout 10s;
            proxy_read_timeout 86400; # Keeps the socket from timing out
        }
    }
}