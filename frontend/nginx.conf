worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        # 1. Serve React static files (Frontend)
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            # This line is crucial so React Router handles page refreshes properly
            try_files $uri $uri/ /index.html; 
        }

        # 2. Route standard API requests to Spring Boot (Backend)
        location /api/ {
            proxy_pass http://backend:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. Route WebSocket traffic (Live Prices)
        location /ws {
            proxy_pass http://backend:8080/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400; # Keeps the socket from timing out
        }
    }
}