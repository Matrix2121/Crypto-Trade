spring.application.name=cryptotrade

# --- PostgreSQL connection ---
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
# Recycle connections before Postgres or proxies close idle sockets (avoids Hikari validation warnings)
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET}
google.client.id=${GOOGLE_CLIENT_ID}
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}
spring.task.scheduling.time-zone=UTC

# On startup, check chart OHLC freshness and auto-sync from Kraken when stale
market-data.startup-check.enabled=true