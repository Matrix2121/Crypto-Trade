spring.application.name=cryptotrade

# --- PostgreSQL connection ---
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET}
google.client.id=${GOOGLE_CLIENT_ID}
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}
spring.task.scheduling.time-zone=UTC

# On startup, check chart OHLC freshness and auto-sync from Kraken when stale
market-data.startup-check.enabled=true